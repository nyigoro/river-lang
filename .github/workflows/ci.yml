name: CI

on:
  push:
  pull_request:

jobs:
  scaffold-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: TS frontend type check
        run: |
          cd compiler/ts-frontend
          npm install
          npm run check

      - name: Rust workspace check
        run: |
          cd backend/rust
          cargo check --workspace